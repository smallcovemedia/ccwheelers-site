[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"


[[headers]]
  for = "/dash-c7w2r9/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ---- Legacy-site URLs (old backlinks + Google index) -> new pages, permanent ----
# Legacy mobile subdomain -> main site (host-based, must come first)
[[redirects]]
  from = "https://mobile.ccwheelers.com/*"
  to = "https://ccwheelers.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://mobile.ccwheelers.com/*"
  to = "https://ccwheelers.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/GPS.htm"
  to = "/map.html"
  status = 301

[[redirects]]
  from = "/gps.htm"
  to = "/map.html"
  status = 301

[[redirects]]
  from = "/intermap.html"
  to = "/map.html"
  status = 301

[[redirects]]
  from = "/Info.htm"
  to = "/faq.html"
  status = 301

[[redirects]]
  from = "/info.htm"
  to = "/faq.html"
  status = 301

[[redirects]]
  from = "/links.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/index.htm"
  to = "/"
  status = 301

[[redirects]]
  from = "/mobile"
  to = "/"
  status = 301

[[redirects]]
  from = "/mobile/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/mobile/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/ccwforum/*"
  to = "/news.html"
  status = 301

[[redirects]]
  from = "/gallery/*"
  to = "/gallery.html"
  status = 301

# Proxy Printful product thumbnails through our own domain so
# ad blockers and strict privacy settings don't hide them
[[redirects]]
  from = "/pfimg/*"
  to = "https://files.cdn.printful.com/:splat"
  status = 200

# Old deep-structure links from forums (ck5.com etc.)
[[redirects]]
  from = "/ccw/*"
  to = "/map.html"
  status = 301

# NOTE: no catch-all rewrite. Unknown URLs (including the hacked-era casino
# spam URLs Google still remembers) must return a real 404 so they fall out
# of the index. Netlify serves 404.html automatically.
